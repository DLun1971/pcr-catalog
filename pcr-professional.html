<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCR Professional Tier Accessory Catalog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f5f2eb;color:#1a1a1a;}
#app{display:flex;flex-direction:column;height:100vh;}
#header{flex-shrink:0;background:#f5f2eb;padding:10px 16px 0;border-bottom:1px solid #ddd9cf;}
#top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.catalog-title{font-size:15px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:10px;}
.catalog-title img{height:40px;}
#view-toggle{display:flex;gap:4px;}
.vtbtn{padding:5px 16px;border-radius:20px;border:1px solid #888;font-size:12px;cursor:pointer;background:transparent;color:#1a1a1a;transition:all .2s;}
.vtbtn.active{background:#1a1a1a;color:#f5f2eb;border-color:#1a1a1a;}
#radio-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.pill-group-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;padding:0 4px;align-self:center;}
.pill-group-sep{width:1px;height:18px;background:#ccc;margin:0 2px;align-self:center;}
.rpill{padding:4px 13px;border-radius:20px;border:1px solid #888;font-size:12px;cursor:pointer;background:transparent;color:#1a1a1a;transition:all .15s;}
.rpill.active{background:#1a1a1a;color:#f5f2eb;border-color:#1a1a1a;}
.rpill:hover:not(.active){background:#ede9e0;}
.rpill.mobile{border-color:#1a6faf;color:#1a6faf;}
.rpill.mobile.active{background:#1a6faf;color:#fff;border-color:#1a6faf;}
.rpill.mobile:hover:not(.active){background:#e8f0f8;}
#cat-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-bottom:10px;}
.cpill{padding:4px 13px;border-radius:20px;border:1px solid #888;font-size:12px;cursor:pointer;background:transparent;color:#1a1a1a;transition:all .15s;}
.cpill.active{background:#2d7a4f;color:#fff;border-color:#2d7a4f;}
.cpill:hover:not(.active){background:#ede9e0;}
#search-input{margin-left:auto;padding:4px 12px;border-radius:20px;border:1px solid #888;font-size:12px;background:#f5f2eb;color:#1a1a1a;width:180px;outline:none;}
#search-input:focus{border-color:#2d7a4f;}
#matrix-subtabs{display:none;align-items:center;gap:6px;padding:6px 0 2px;}
.mstab{padding:4px 16px;border-radius:20px;border:1px solid #888;font-size:12px;cursor:pointer;background:transparent;color:#1a1a1a;transition:all .15s;}
.mstab.active{background:#555;color:#fff;border-color:#555;}
.mstab.active.mobile-tab{background:#1a6faf;border-color:#1a6faf;}
.mstab:hover:not(.active){background:#ede9e0;}
#table-wrap{flex:1;overflow-y:auto;background:#fff;transition:opacity .2s;}
#table-wrap.fading{opacity:0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{position:sticky;top:0;z-index:10;padding:7px 8px;text-align:left;font-weight:600;font-size:11px;color:#555;border-bottom:2px solid #ddd9cf;background:#f0ede4;white-space:nowrap;}
thead th.radio-col{background:#dde8f4;color:#1a5fa8;text-align:center;}
thead th.mobile-col{background:#e8f0f8;color:#1a6faf;text-align:center;}
thead th.fc{text-align:center;}
thead th.cc{text-align:center;width:52px;}
thead th.ic{width:44px;}
td{padding:7px 8px;border-bottom:0.5px solid #ede9e0;vertical-align:middle;}
tr:hover td{background:#faf8f3;}
td.fc{text-align:center;}
td.cc{text-align:center;width:52px;}
.sr td{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#777;padding:5px 8px;background:#f7f4ed;border-bottom:1px solid #e5e0d5;}
.img-box{width:34px;height:34px;background:#f0ede4;border:0.5px solid #ddd9cf;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.img-box:hover{opacity:.75;}
.img-box img{width:34px;height:34px;object-fit:contain;}
.img-box svg{opacity:.3;}
.pn{font-weight:700;white-space:nowrap;cursor:pointer;position:relative;color:#1a1a1a;}
.pn:hover{color:#2d7a4f;}
.copied-tip{position:absolute;left:0;top:-20px;background:#2d7a4f;color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;z-index:20;}
.pn.flash .copied-tip{opacity:1;}
.chk{color:#2d7a4f;font-weight:700;}
.dash{color:#ccc;}
.ip-badge{display:inline-block;padding:1px 7px;border-radius:20px;border:1.5px solid #2d7a4f;color:#2d7a4f;font-size:10px;font-weight:600;}
.mylist-cb{width:15px;height:15px;cursor:pointer;accent-color:#2d7a4f;}
#btn-report{padding:5px 14px;border-radius:20px;border:1.5px solid #2d7a4f;background:transparent;color:#2d7a4f;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
#btn-report:hover{background:#2d7a4f;color:#fff;}
#report-badge{background:#2d7a4f;color:#fff;border-radius:20px;padding:0 7px;font-size:11px;min-width:20px;text-align:center;}
#btn-report:hover #report-badge{background:#fff;color:#2d7a4f;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90;display:none;}
#overlay.open{display:block;}
#drawer{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.12);z-index:100;display:flex;flex-direction:column;transition:right .3s ease;}
#drawer.open{right:0;}
#drawer-hdr{padding:16px;border-bottom:1px solid #ede9e0;display:flex;align-items:center;justify-content:space-between;}
#drawer-hdr h2{font-size:14px;font-weight:600;}
#drawer-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;}
#drawer-body{flex:1;overflow-y:auto;padding:12px;}
#drawer-empty{color:#aaa;font-size:12px;text-align:center;padding:40px 0;}
#drawer-items .di{padding:10px 0;border-bottom:0.5px solid #ede9e0;}
#drawer-items .di-pn{font-weight:700;font-size:12px;}
#drawer-items .di-desc{font-size:11px;color:#666;margin:2px 0 5px;}
#drawer-items textarea{width:100%;font-size:11px;border:0.5px solid #ddd;border-radius:4px;padding:4px 6px;resize:vertical;min-height:34px;font-family:inherit;}
#drawer-ftr{padding:12px 16px;border-top:1px solid #ede9e0;display:flex;gap:8px;}
#btn-clear{flex:1;padding:8px;border-radius:8px;border:1px solid #ccc;background:transparent;cursor:pointer;font-size:12px;}
#btn-pdf{flex:2;padding:8px;border-radius:8px;border:none;background:#2d7a4f;color:#fff;cursor:pointer;font-size:12px;font-weight:600;}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lb-img{max-width:80vw;max-height:80vh;object-fit:contain;border-radius:8px;background:#fff;padding:12px;}
#lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:30px;cursor:pointer;line-height:1;}
#empty-state{text-align:center;padding:60px;color:#aaa;font-size:13px;display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="top-bar">
      <div class="catalog-title">
        <img src="https://dlun1971.github.io/pcr-catalog/assets/images/motorola-solutions-logo.png" alt="Motorola Solutions">
        MOTOTRBO Professional Catalog
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="view-toggle">
          <button class="vtbtn active" onclick="setView('radio')">By Radio</button>
          <button class="vtbtn" onclick="setView('matrix')">Full Matrix</button>
        </div>
        <button id="btn-report" onclick="openDrawer()">My List <span id="report-badge">0</span></button>
      </div>
    </div>
    <div id="radio-row"></div>
    <div id="matrix-subtabs">
      <button class="mstab active" onclick="setMatrixTab('portable')">Portable Radios</button>
      <button class="mstab mobile-tab" onclick="setMatrixTab('mobile')">Mobile Radios</button>
    </div>
    <div id="cat-row">
      <div id="cat-pills"></div>
      <input id="search-input" type="text" placeholder="Search part number or description..." oninput="renderTable()">
    </div>
  </div>
  <div id="table-wrap">
    <table id="main-table">
      <thead id="t-head"><tr></tr></thead>
      <tbody id="t-body"></tbody>
    </table>
    <div id="empty-state">No accessories match your selection.</div>
  </div>
</div>

<div id="overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div id="drawer-hdr">
    <h2>My List</h2>
    <button id="drawer-close" onclick="closeDrawer()">&#10005;</button>
  </div>
  <div id="drawer-body">
    <div id="drawer-empty">No items selected. Check boxes to add accessories.</div>
    <div id="drawer-items"></div>
  </div>
  <div id="drawer-ftr">
    <button id="btn-clear" onclick="clearList()">Clear All</button>
    <button id="btn-pdf" onclick="exportPDF()">Export PDF</button>
  </div>
</div>

<div id="lightbox" onclick="closeLB()">
  <span id="lb-close" onclick="closeLB()">&#10005;</span>
  <img id="lb-img" src="" alt="">
</div>

<script src="data/r7-data.js?v=3"></script>
<script src="data/xpr-mobile-data.js?v=2"></script>
<script src="data/xpr7000-data.js?v=2"></script>
<script src="data/xpr6000-data.js?v=2"></script>
<script src="data/xpr3000-data.js?v=2"></script>
<script src="data/sl-data.js?v=1"></script>
<script>
// ââ RADIO MAP: display label -> data key ââ
const PCR_RADIO_MAP = {
  'R7':'r7','Ion':'ion','R5':'r5','R7Ex':'r7ex',
  'XPR 5000':'xpr-mobile','XPR 4000':'xpr-mobile','XPR 2500':'xpr-mobile',
    'XPR 7000':'xpr7000','XPR 6000':'xpr6000','XPR 3000':'xpr3000','SL Series':'sl'
};

const PORTABLE_RADIOS = ['R7','Ion','R5','R7Ex','XPR 7000','XPR 6000','XPR 3000','SL Series'];
const MOBILE_RADIOS   = ['XPR 5000','XPR 4000','XPR 2500'];
const MOBILE_COL_KEYS = {
  'XPR 5000':'xpr5000e',
  'XPR 4000': 'xpr4000',
  'XPR 2500': 'xpr2500'
};

// ââ CAT MAP: display name -> data key ââ
const PCR_CAT_MAP = {
  'RSMs':'rsm','Wireless':'wireless','Surveillance':'surveillance',
  'Headsets':'headsets','Batteries':'batteries','Chargers':'chargers',
  'Carry':'carry','Antennas':'antennas','Cables':'cables','Software':'software','All':'all'
};

// ââ MOBILE CAT MAP: display label -> xpr-mobile category key ââ
const MOBILE_CAT_MAP = {
  'Microphones':       'microphones',
  'Mic Accessories':   'mic_accessories',
  'External PTT':      'ext_ptt',
  'Wireless Kits':     'wireless_kits',
  'Wireless Chargers': 'wireless_chargers',
  'OpCrit Wireless':   'opcrit_wireless',
  'OpCrit Parts':      'opcrit_parts',
  'Control Station':   'control_station',
  'Installation':      'installation',
  'Speakers':          'speakers',
  'Cables':            'cables',
  'Antennas':          'antennas',
  'Ant Accessories':   'ant_accessories',
  'All':               'all'
};

function isMobileRadio(r) { return MOBILE_RADIOS.includes(r); }

// ââ COL LABELS ââ
const PCR_COL_LABELS = {
  impres:'IMPRES', ip:'IP Rating', hazloc:'HazLoc', windport:'Windport',
  wwet:'Work-When-Wet', intel:'Intelligent Audio', ains:'AINS',
  progbtn:'Prog Btn', volsteps:'Vol Steps', jack:'Jack',
  bt:'Bluetooth', fulldx:'Full Duplex', ion_fw:'Ion FW',
  nrr:'NRR', nc:'Noise Cancel', wires:'Wires',
  hstype:'Headset Type', epstyle:'Earpiece Style',
  mic:'Mic', ptt:'PTT',
  chem:'Chemistry', mah:'Capacity (mAh)', temp:'Temp Range',
  dims:'Dimensions', weight:'Weight',
  pockets:'Pockets', voltage:'Voltage', material:'Material',
  belt_sz:'Belt Size', swivel:'Swivel', display:'Display', drings:'D-Rings',
  style:'Style', band:'Band', freq_mhz:'Freq (MHz)',
  ant_type:'Antenna Type', len_cm:'Length (cm)',
  talktime:'Talk Time', chrgtime:'Charge Time',
  eptype:'Earpiece Type', opscrit:'Ops Critical',
  pairing:'Pairing', range:'Range'
};

// ââ FEATURE COLS PER CATEGORY ââ
const PCR_CAT_FEAT = {
  rsm:         ['impres','ip','hazloc','windport','wwet','intel','ains','progbtn','jack'],
  wireless:    ['ip','hazloc','bt','fulldx','mic','ptt','talktime','chrgtime','weight'],
  surveillance:['impres','hazloc','intel','nrr','wires','hstype','epstyle','mic','ptt'],
  headsets:    ['impres','ip','hazloc','intel','nrr','nc','hstype','epstyle','mic','ptt'],
  batteries:   ['impres','chem','mah','ip','hazloc','temp'],
  chargers:    ['impres','pockets','voltage','chem','belt_sz','swivel','display','drings'],
  carry:       ['style','material','belt_sz','swivel'],
  antennas:    ['band','freq_mhz','ant_type','len_cm','hazloc'],
  cables:      [],
  all:         ['impres','ip','hazloc','windport']
};
const PCR_DEFAULT_FEAT = ['impres','ip','hazloc','windport'];

// ââ STATE ââ
let currentView      = 'radio';
let currentRadio     = 'R7';
let currentCat       = 'All';
let currentMatrixTab = 'portable';
let myList = {};
const IMG_CACHE = {};

// ââ INIT ââ
function init() {
  const p = new URLSearchParams(location.search);
  if (p.get('view'))  currentView  = p.get('view');
  if (p.get('radio') && PCR_RADIO_MAP[p.get('radio')]) currentRadio = p.get('radio');
  if (p.get('cat')   && PCR_CAT_MAP[p.get('cat')])     currentCat   = p.get('cat');
  if (p.get('mtab')  && ['portable','mobile'].includes(p.get('mtab'))) currentMatrixTab = p.get('mtab');
  buildRadioPills();
  buildCatPills();
  renderTable();
}

function pushState() {
  const u = new URL(location.href);
  u.searchParams.set('view',  currentView);
  u.searchParams.set('radio', currentRadio);
  u.searchParams.set('cat',   currentCat);
  u.searchParams.set('mtab',  currentMatrixTab);
  history.replaceState({}, '', u);
}

// ââ RADIO PILLS ââ
function buildRadioPills() {
  const row = document.getElementById('radio-row');
  row.innerHTML =
    '<span class="pill-group-label">Portable</span>' +
    PORTABLE_RADIOS.map(r =>
      `<button class="rpill${r===currentRadio&&currentView==='radio'?' active':''}" onclick="selectRadio('${r}')">${r}</button>`
    ).join('') +
    '<span class="pill-group-sep"></span>' +
    '<span class="pill-group-label">Mobile</span>' +
    MOBILE_RADIOS.map(r =>
      `<button class="rpill mobile${r===currentRadio&&currentView==='radio'?' active':''}" onclick="selectRadio('${r}')">${r}</button>`
    ).join('');
}

// ââ CAT PILLS ââ
function buildCatPills() {
  const mobile = isMobileRadio(currentRadio);
  const map = mobile ? MOBILE_CAT_MAP : PCR_CAT_MAP;
  if (!Object.keys(map).includes(currentCat)) currentCat = 'All';
  document.getElementById('cat-pills').innerHTML = Object.keys(map).map(label =>
    `<button class="cpill${label===currentCat?' active':''}" onclick="selectCat('${label}')">${label}</button>`
  ).join('');
}

function selectRadio(r) {
  currentRadio = r;
  if (currentView !== 'radio') { currentView = 'radio'; syncViewBtns(); }
  document.querySelectorAll('.rpill').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === r)
  );
  buildCatPills();
  fadeRender(); pushState();
}

function selectCat(c) {
  currentCat = c;
  document.querySelectorAll('.cpill').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === c)
  );
  fadeRender(); pushState();
}

function setView(v) {
  currentView = v;
  syncViewBtns();
  document.getElementById('matrix-subtabs').style.display = v === 'matrix' ? 'flex' : 'none';
  document.querySelectorAll('.rpill').forEach(b =>
    b.classList.toggle('active', v === 'radio' && b.textContent.trim() === currentRadio)
  );
  fadeRender(); pushState();
}

function setMatrixTab(tab) {
  currentMatrixTab = tab;
  document.querySelectorAll('.mstab').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase().startsWith(tab))
  );
  fadeRender(); pushState();
}

function syncViewBtns() {
  document.querySelectorAll('.vtbtn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === (currentView === 'radio' ? 'By Radio' : 'Full Matrix'))
  );
}

function fadeRender() {
  const tw = document.getElementById('table-wrap');
  tw.classList.add('fading');
  setTimeout(() => { renderTable(); tw.classList.remove('fading'); }, 160);
}

// ââ DATA HELPERS ââ
function getDataKey(radioLabel) { return PCR_RADIO_MAP[radioLabel] || radioLabel; }

function getCatSections(radioKey, catKey) {
  const rd = window.RADIOS_DATA && window.RADIOS_DATA[radioKey];
  if (!rd) return [];
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  let sections = [];
  if (catKey === 'all') {
    Object.values(rd.categories).forEach(cat => {
      cat.sections.forEach(sec =>
        sections.push({ title: sec.title, items: sec.items, cols: cat.cols })
      );
    });
  } else {
    const cat = rd.categories[catKey];
    if (!cat) return [];
    cat.sections.forEach(sec =>
      sections.push({ title: sec.title, items: sec.items, cols: cat.cols })
    );
  }
  if (search) {
    sections = sections.map(s => ({
      ...s,
      items: s.items.filter(i =>
        (i.pn||'').toLowerCase().includes(search) ||
        (i.desc||'').toLowerCase().includes(search)
      )
    })).filter(s => s.items.length);
  }
  return sections;
}

// ââ RENDER DISPATCHER ââ
function renderTable() {
  if (currentView === 'radio') renderRadioView();
  else renderMatrixView();
}

// ââ RADIO VIEW ââ
function renderRadioView() {
  const rk     = getDataKey(currentRadio);
  const mobile = isMobileRadio(currentRadio);

  if (mobile) {
    const ck = MOBILE_CAT_MAP[currentCat] || 'all';
    const sections = getCatSections(rk, ck);
    const rd = window.RADIOS_DATA && window.RADIOS_DATA[rk];
    const colDefs = (ck !== 'all' && rd && rd.categories[ck])
      ? rd.categories[ck].cols
      : [
          { key:'desc',     label:'Description',    type:'text'  },
          { key:'pn',       label:'Part #',         type:'pn'    },
          { key:'xpr5000e', label:'XPR 5000',       type:'check' },
          { key:'xpr4000',  label:'XPR 4000',       type:'check' },
          { key:'xpr2500',  label:'XPR 2500',       type:'check' },
        ];
    const span = 2 + colDefs.length;
    document.getElementById('t-head').innerHTML = `<tr>
      <th class="ic"></th>
      ${colDefs.map(c => {
        if (c.key === 'desc') return `<th style="min-width:200px">Description</th>`;
        if (c.key === 'pn')   return `<th>Part No.</th>`;
        if (c.type === 'check') return `<th class="fc mobile-col">${c.label}</th>`;
        return `<th class="fc">${c.label}</th>`;
      }).join('')}
      <th class="cc">My List</th>
    </tr>`;
    let html = '';
    sections.forEach(sec => {
      html += `<tr class="sr"><td colspan="${span}">${sec.title||''}</td></tr>`;
      (sec.items||[]).forEach(item => {
        const pn = item.pn||'';
        const checked = myList[pn] ? 'checked' : '';
        html += `<tr data-pn="${pn}">
          <td><div class="img-box" onclick="imgClick('${pn}')">${imgCell(pn)}</div></td>
          ${colDefs.map(c => {
            if (c.key === 'pn')   return `<td><div class="pn" onclick="copyPN('${pn}',this)"><span class="copied-tip">Copied!</span>${pn}</div></td>`;
            if (c.key === 'desc') return `<td>${item.desc||''}</td>`;
            return `<td class="fc">${renderFeat(c.key, item[c.key])}</td>`;
          }).join('')}
          <td class="cc"><input type="checkbox" class="mylist-cb" ${checked} onchange="toggleML('${pn}',this,${JSON.stringify(item.desc||'')})"></td>
        </tr>`;
      });
    });
    document.getElementById('t-body').innerHTML = html || '';
    document.getElementById('empty-state').style.display = sections.length ? 'none' : 'block';
    prefetchImages(sections);

  } else {
    const ck       = PCR_CAT_MAP[currentCat] || 'all';
    const sections = getCatSections(rk, ck);
    const featCols = PCR_CAT_FEAT[ck] || PCR_DEFAULT_FEAT;
    const span     = 3 + featCols.length + 1;
    document.getElementById('t-head').innerHTML = `<tr>
      <th class="ic"></th>
      <th>Part No.</th>
      <th style="min-width:200px">Description</th>
      ${featCols.map(c => `<th class="fc">${PCR_COL_LABELS[c]||c}</th>`).join('')}
      <th class="cc">My List</th>
    </tr>`;
    let html = '';
    sections.forEach(sec => {
      html += `<tr class="sr"><td colspan="${span}">${sec.title||''}</td></tr>`;
      (sec.items||[]).forEach(item => {
        const pn = item.pn||'';
        const checked = myList[pn] ? 'checked' : '';
        html += `<tr data-pn="${pn}">
          <td><div class="img-box" onclick="imgClick('${pn}')">${imgCell(pn)}</div></td>
          <td><div class="pn" onclick="copyPN('${pn}',this)"><span class="copied-tip">Copied!</span>${pn}</div></td>
          <td>${item.desc||''}</td>
          ${featCols.map(c => `<td class="fc">${renderFeat(c, item.checks?.[c])}</td>`).join('')}
          <td class="cc"><input type="checkbox" class="mylist-cb" ${checked} onchange="toggleML('${pn}',this,${JSON.stringify(item.desc||'')})"></td>
        </tr>`;
      });
    });
    document.getElementById('t-body').innerHTML = html || '';
    document.getElementById('empty-state').style.display = sections.length ? 'none' : 'block';
    prefetchImages(sections);
  }
}

// ââ MATRIX VIEW ââ
function renderMatrixView() {
  if (currentMatrixTab === 'portable') renderPortableMatrix();
  else renderMobileMatrix();
}

function renderPortableMatrix() {
  const ck = PCR_CAT_MAP[currentCat] || 'all';
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const allSecs = {};

  PORTABLE_RADIOS.forEach(rn => {
    const rk = PCR_RADIO_MAP[rn];
    const rd = window.RADIOS_DATA && window.RADIOS_DATA[rk];
    if (!rd) return;
    const cats = ck === 'all'
      ? Object.values(rd.categories)
      : [rd.categories[ck]].filter(Boolean);
    cats.forEach(cat => {
      (cat.sections||[]).forEach(sec => {
        (sec.items||[]).forEach(item => {
          const pn = item.pn||'';
          if (search && !(pn.toLowerCase().includes(search)||(item.desc||'').toLowerCase().includes(search))) return;
          if (!allSecs[sec.title]) allSecs[sec.title] = {};
          if (!allSecs[sec.title][pn]) allSecs[sec.title][pn] = { desc: item.desc||'', radios: {} };
          allSecs[sec.title][pn].radios[rn] = true;
        });
      });
    });
  });

  const span = 3 + PORTABLE_RADIOS.length + 1;
  document.getElementById('t-head').innerHTML = `<tr>
    <th class="ic"></th>
    <th>Part No.</th>
    <th style="min-width:180px">Description</th>
    ${PORTABLE_RADIOS.map(r => `<th class="fc radio-col">${r}</th>`).join('')}
    <th class="cc">My List</th>
  </tr>`;

  let html = '';
  Object.keys(allSecs).forEach(title => {
    html += `<tr class="sr"><td colspan="${span}">${title}</td></tr>`;
    Object.keys(allSecs[title]).forEach(pn => {
      const item = allSecs[title][pn];
      const checked = myList[pn] ? 'checked' : '';
      html += `<tr data-pn="${pn}">
        <td><div class="img-box" onclick="imgClick('${pn}')">${imgCell(pn)}</div></td>
        <td><div class="pn" onclick="copyPN('${pn}',this)"><span class="copied-tip">Copied!</span>${pn}</div></td>
        <td>${item.desc}</td>
        ${PORTABLE_RADIOS.map(r => `<td class="fc">${item.radios[r]
          ? '<span class="chk">&#10003;</span>'
          : '<span class="dash">&mdash;</span>'}</td>`).join('')}
        <td class="cc"><input type="checkbox" class="mylist-cb" ${checked} onchange="toggleML('${pn}',this,${JSON.stringify(item.desc)})"></td>
      </tr>`;
    });
  });
  document.getElementById('t-body').innerHTML = html || '';
  document.getElementById('empty-state').style.display = Object.keys(allSecs).length ? 'none' : 'block';
}

// ââ FEATURE RENDERER ââ
function renderFeat(col, val) {
  if (val === undefined || val === null || val === 0 || val === false || val === '')
    return '<span class="dash">&mdash;</span>';
  if (val === true || val === 1) return '<span class="chk">&#10003;</span>';
  if (col === 'ip') return `<span class="ip-badge">${val}</span>`;
  return `<span>${val}</span>`;
}

// ââ IMAGES ââ
function camSVG() {
  return `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="14" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8.5" r="2.2" stroke="currentColor" stroke-width="1.2"/><path d="M5.5 4V3.5A.5.5 0 016 3h4a.5.5 0 01.5.5V4" stroke="currentColor" stroke-width="1.2"/></svg>`;
}
function imgCell(pn) {
  const url = IMG_CACHE[pn];
  if (url) return `<img src="${url}" alt="${pn}">`;
  return camSVG();
}
function prefetchImages(sections) {
  sections.forEach(sec => (sec.items||[]).forEach(item => tryLoadImg(item.pn||'')));
}
function tryLoadImg(pn) {
  if (!pn || IMG_CACHE[pn] !== undefined) return;
  IMG_CACHE[pn] = null;
  const urls = [
    `https://www.motorolasolutions.com/content/dam/msi/images/products/accessories/${pn.toLowerCase()}_pdp_na_na.jpg`,
    `https://www.motorolasolutions.com/content/dam/msi/images/products/accessories/${pn.toLowerCase()}.jpg`
  ];
  const img = new Image();
  img.onload = () => {
    IMG_CACHE[pn] = img.src;
    document.querySelectorAll(`[data-pn="${pn}"] .img-box`).forEach(box => {
      box.innerHTML = `<img src="${img.src}" alt="${pn}">`;
    });
  };
  img.src = urls[0];
}
function imgClick(pn) {
  const url = IMG_CACHE[pn];
  if (url) {
    document.getElementById('lb-img').src = url;
    document.getElementById('lightbox').classList.add('open');
  }
}

// ââ COPY PN ââ
function copyPN(pn, el) {
  navigator.clipboard.writeText(pn).catch(()=>{});
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 1400);
}

// ââ LIGHTBOX ââ
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }

// ââ MY LIST ââ
function toggleML(pn, cb, desc) {
  if (cb.checked) myList[pn] = { pn, desc, note:'' };
  else delete myList[pn];
  document.getElementById('report-badge').textContent = Object.keys(myList).length;
  if (document.getElementById('drawer').classList.contains('open')) renderDrawer();
}
function openDrawer() {
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function clearList() {
  myList = {};
  document.querySelectorAll('.mylist-cb').forEach(cb => cb.checked = false);
  document.getElementById('report-badge').textContent = '0';
  renderDrawer();
}
function renderDrawer() {
  const items = Object.values(myList);
  document.getElementById('drawer-empty').style.display = items.length ? 'none' : 'block';
  document.getElementById('drawer-items').innerHTML = items.map(i => `
    <div class="di">
      <div class="di-pn">${i.pn}</div>
      <div class="di-desc">${i.desc}</div>
      <textarea placeholder="Notes..." oninput="myList['${i.pn}'].note=this.value">${i.note||''}</textarea>
    </div>`).join('');
}
