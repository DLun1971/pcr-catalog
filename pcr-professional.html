*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;min-height:100vh;overflow-y:auto}

/* TOPBAR */
#topbar{background:#0C2D5A;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
#topbar-left{display:flex;align-items:center;gap:12px}
#moto-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#brand{color:#fff;font-size:15px;font-weight:500;letter-spacing:0.01em}
#mylist-pill{display:flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,0.35);border-radius:20px;padding:5px 16px;cursor:pointer;color:#fff;font-size:12px;user-select:none}
#mylist-pill:hover{background:rgba(255,255,255,0.1)}#whatsnew-pill:hover{background:rgba(255,255,255,0.1)}#search-pill:hover{background:rgba(255,255,255,0.05)}
#mylist-count{background:rgba(255,255,255,0.2);border-radius:10px;padding:1px 7px;font-size:11px;color:#fff}@keyframes badge-pulse{0%,100%{transform:scale(1);background:rgba(255,255,255,0.2)}50%{transform:scale(1.25);background:#5DCAA5}}#whatsnew-count.pulsing{animation:badge-pulse 1.6s ease-in-out infinite;display:inline-block}


/* RADIO PANEL */
#radio-panel{background:#112240;padding:10px 16px 12px;}
.panel-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.pill-row{display:flex;flex-wrap:wrap;gap:4px;}
/* RADIO PANEL */
#radio-row{display:flex;flex-direction:column;gap:0;margin-bottom:0;}
.radio-section{display:flex;align-items:center;justify-content:space-between;}
.radio-section-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 0;}
.pill-tab-row{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.15);margin-bottom:4px;}
.radio-tile-row{display:flex;gap:2px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:0;}
.rtile{padding:5px 11px 6px;border-radius:4px;cursor:pointer;border-bottom:2px solid transparent;background:transparent;text-align:center;margin-bottom:-1px;}
.rtile-name{font-size:12px;font-weight:500;color:rgba(255,255,255,0.45);white-space:nowrap;}
.rtile-sub{font-size:9px;color:rgba(255,255,255,0.22);margin-top:2px;white-space:nowrap;}
.rtile.active .rtile-name{color:#fff;}
.rtile.active{border-bottom-color:#378ADD;}
.rtile.active .rtile-sub{color:rgba(255,255,255,0.45);}
.rtile:hover:not(.active) .rtile-name{color:rgba(255,255,255,0.75);}
.rtile.mob .rtile-name{font-size:11px;color:rgba(255,255,255,0.3);}
.rtile.mob.active .rtile-name{color:rgba(255,255,255,0.85);}
.rtile.mob.active{border-bottom-color:#1D9E75;}
.rtile.mob:hover:not(.active) .rtile-name{color:rgba(255,255,255,0.6);}
.tile-sep{width:1px;height:28px;background:rgba(255,255,255,0.12);margin:0 4px;align-self:center;}
.tile-mob-label{font-size:9px;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:.08em;align-self:flex-end;padding-bottom:8px;margin:0 4px 0 2px;white-space:nowrap;}
.rpill{display:none;}
.region-seg{display:inline-flex;border:1px solid rgba(255,255,255,0.25);border-radius:6px;overflow:hidden;}
.rseg{padding:6px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.45);background:transparent;border:none;border-right:1px solid rgba(255,255,255,0.2);cursor:pointer;text-transform:uppercase;letter-spacing:.05em;}
.rseg:last-child{border-right:none;}
.rseg.active{background:#185FA5;color:#fff;}
.rseg:hover:not(.active){background:rgba(255,255,255,0.1);color:#fff;}

/* variant pills removed */

/* FILTER STRIP */
#filter-strip{display:flex;align-items:center;gap:8px;padding:10px 0 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:10px}
#filter-label{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
.ftoggle{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;font-size:11px;cursor:pointer;user-select:none;transition:all 0.15s}
.ftoggle:hover{border-color:rgba(255,255,255,0.45)}
.ftoggle.active.f-blue{background:rgba(56,138,221,0.25);border-color:#378ADD}
.ftoggle.active.f-green{background:rgba(29,158,117,0.25);border-color:#1D9E75}
.ftoggle.active.f-amber{background:rgba(186,117,23,0.25);border-color:#BA7517}
.fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.3)}
.ftoggle.active.f-blue .fdot{background:#378ADD}
.ftoggle.active.f-green .fdot{background:#1D9E75}
.ftoggle.active.f-amber .fdot{background:#EF9F27}

/* CONTENT AREA */
#content-area{background:#fff;border-top:3px solid #185FA5}
#cat-bar{padding:10px 20px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:0.5px solid #e0e0e0}
.cpill{padding:4px 13px;border-radius:14px;font-size:12px;cursor:pointer;border:0.5px solid #ccc;color:#555;background:transparent;user-select:none;transition:all 0.15s}
.cpill:hover{background:#f0f0f0}
.cpill.active{background:#0C2D5A;border-color:#0C2D5A;color:#fff}

#toolbar{padding:8px 20px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid #e0e0e0}
#breadcrumb{font-size:12px;color:#777}
#breadcrumb b{color:#222;font-weight:500}


#table-area{padding:0 20px 40px}
.sec-head{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;padding:16px 0 6px;display:flex;align-items:center;gap:8px}
.sec-count{font-weight:400;color:#bbb;text-transform:none;letter-spacing:0;font-size:11px}
.no-items{font-size:13px;color:#aaa;padding:12px 0}

table.acc-table{width:100%;border-collapse:collapse;font-size:12px}
table.acc-table th{text-align:left;padding:7px 10px;border-bottom:1px solid #ddd;font-size:11px;font-weight:500;color:#888;white-space:nowrap;background:#fafafa}
table.acc-table td{padding:8px 10px;border-bottom:0.5px solid #f0f0f0;color:#222;vertical-align:middle}
table.acc-table tr:last-child td{border-bottom:none}
table.acc-table tr:hover td{background:#f9f9f9}
.img-box{width:34px;height:34px;background:#f0f0f0;border-radius:4px;border:0.5px solid #e0e0e0;flex-shrink:0}
.pn{font-family:monospace;font-size:11px;color:#888}
.chk-yes{color:#1D9E75;text-align:center;font-size:13px}.acc-table td{text-align:center}.acc-table td:nth-child(2){text-align:left}.acc-table td:nth-child(3){text-align:left}
.chk-no{color:#ccc;text-align:center;font-size:13px}
.row-cb{cursor:pointer;width:14px;height:14px}
.spec-tag{display:inline-block;font-size:10px;padding:2px 5px;border-radius:6px;margin-left:3px;vertical-align:middle}
.tag-ip{background:#E6F1FB;color:#0C447C}
.tag-hz{background:#EAF3DE;color:#3B6D11}.tag-ul{background:#EAF3DE;color:#3B6D11}.tag-atex{background:#E6F1FB;color:#0C447C}.tag-csa{background:#FFF3E0;color:#E65100}
#page-wrap{display:flex;align-items:stretch}
#main-col{flex:1;min-width:0}
#radio-sidebar{width:220px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;align-items:center;padding:24px 16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow:hidden}
#sidebar-img{width:180px;height:180px;object-fit:contain;display:block}
#sidebar-img.hidden{display:none}
#sidebar-placeholder{width:180px;height:180px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px}
#sidebar-name{margin-top:16px;font-size:14px;font-weight:600;color:#0C2D5A;text-align:center}
#sidebar-type{font-size:11px;color:#888;margin-top:4px;text-align:center}
#lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.2);z-index:999;align-items:center;justify-content:center;cursor:pointer}
#lightbox.open{display:flex}
#lightbox img{max-width:50vw;max-height:50vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}

function selectRegion(r) {
  currentRegion = r;
  var reg = REGIONS[r] || REGIONS.NA;
  var all = reg.portable.concat(reg.mobile);
  var match = all.find(function(x){return x.key===currentRadioKey;});
  if (match) {
    currentRadio = match.label;
    var info = document.getElementById('variant-info');
    if (match.variants) { info.textContent = match.variants; info.style.display = 'block'; }
    else { info.textContent = ''; info.style.display = 'none'; }
    buildPortablePills();
    buildMobilePills();
    updateSidebar();
    updateBreadcrumb();
  } else {
    var first = reg.portable[0];
    buildPortablePills();
    buildMobilePills();
    selectRadio(first.label, first.key, false);
    var info = document.getElementById('variant-info');
    if (first.variants) { info.textContent = first.variants; info.style.display = 'block'; }
    else { info.textContent = ''; info.style.display = 'none'; }
  }
}



function buildPortablePills() {
  var vc = {"r7":"global","ion":"global","r5":"global","r7ex":"global","xpr7000":"5 variants","dpatex":"4 variants","xpr6000":"3 variants","xpr3000":"3 variants","sl7000":"3 variants","sl3000":"2 variants","xpr5000":"4 variants","xpr4000":"NA only","xpr2500":"NA only"};
  const row = document.getElementById('portable-pills');
  row.innerHTML = '';
  row.className = 'radio-tile-row';
  const portRadios = (REGIONS[currentRegion] || REGIONS.NA).portable;
  portRadios.forEach(r => {
    const d = document.createElement('div');
    d.className = 'rtile' + (r.key === currentRadioKey && !isMobile ? ' active' : '');
    var sub = vc[r.key] || '';
    d.innerHTML = '<div class="rtile-name">' + r.label + '</div><div class="rtile-sub">' + (sub || '') + '</div>';
    d.onclick = () => {
      selectRadio(r.label, r.key, false);
      var info = document.getElementById('variant-info');
      if (r.variants) { info.textContent = r.variants; info.style.display = 'block'; }
      else { info.textContent = ''; info.style.display = 'none'; }
    };
    row.appendChild(d);
  });
  var sep = document.createElement('div'); sep.className = 'tile-sep'; row.appendChild(sep);
  var ml = document.createElement('div'); ml.className = 'tile-mob-label'; ml.textContent = 'Mobile'; row.appendChild(ml);
  const mobRadios = (REGIONS[currentRegion] || REGIONS.NA).mobile;
  mobRadios.forEach(r => {
    const d = document.createElement('div');
    d.className = 'rtile mob' + (r.key === currentRadioKey && isMobile ? ' active' : '');
    var sub = vc[r.key] || '';
    d.innerHTML = '<div class="rtile-name">' + r.label + '</div>' + (sub ? '<div class="rtile-sub">' + sub + '</div>' : '');
    d.onclick = () => {
      selectRadio(r.label, r.key, true);
      var info = document.getElementById('variant-info');
      if (r.variants) { info.textContent = r.variants; info.style.display = 'block'; }
      else { info.textContent = ''; info.style.display = 'none'; }
    };
    row.appendChild(d);
  });
  const regionRow = document.getElementById('region-seg-row');
  if (regionRow) {
    regionRow.querySelectorAll('.rseg').forEach(b => b.classList.toggle('active', b.textContent.trim()===currentRegion));
  }
}

function selectRadio(label, key, mobile) {
  currentRadio    = label;
  currentRadioKey = key;
  isMobile        = mobile;
  currentCat      = 'All';
  currentVariant  = null;
  buildPortablePills();
  buildMobilePills();
  buildVariantStrip(key);
  buildCatBar();
  render();
  updateSidebar();
}

function buildVariantStrip(key) {
  var info = document.getElementById('variant-info');
  var text = VARIANT_INFO[key];
  if (text) {
    info.textContent = text;
    info.style.display = 'block';
  } else {
    info.textContent = '';
    info.style.display = 'none';
  }
}

function buildCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = '';
  const cats = isMobile ? MOBILE_CATS : PORTABLE_CATS;
  cats.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cpill' + (c === currentCat ? ' active' : '');
    d.textContent = c;
    d.onclick = () => {
      currentCat = c;
      buildCatBar();
      render();
    };
    bar.appendChild(d);
  });
}

// ---- RENDER ----
function render() {
  var area   = document.getElementById('table-area');
  var search = document.getElementById('search-input').value.toLowerCase().trim();
  if (search.length > 0) { renderGlobalSearch(search, area); return; }
  updateBreadcrumb();
  if (!currentRadioKey) { area.innerHTML = '<div class="no-items">Select a radio above.</div>'; return; }
  var rd = RADIOS_DATA[currentRadioKey.toLowerCase()];
  if (!rd || !rd.length) { area.innerHTML = '<div class="no-items">No data available for this radio.</div>'; return; }
  var sections = [];
  if (currentCat === 'All') {
    sections = rd.map(function(s) { return {name: s.name||s.label, items: s.items||[], cols: (s.cols||s.columns||COLS_BY_SECTION[s.name||s.label]||[]).map(function(c){return typeof c==='string'?{key:LABEL_TO_KEY[c]||c.toLowerCase().replace(/ /g,'_'),label:c}:c;})}; });
  } else {
    var found = rd.find(function(s){return (s.name||s.label||'').toLowerCase()===currentCat.toLowerCase();});
    if (found) sections = [{name:found.name||found.label, items:found.items||[], cols:(found.cols||found.columns||COLS_BY_SECTION[found.name||found.label]||[]).map(function(c){return typeof c==='string'?{key:LABEL_TO_KEY[c]||c.toLowerCase().replace(/ /g,'_'),label:c}:c;})}];
  }
  if (currentFilters.impres) sections = sections.map(function(s){return {name:s.name,cols:s.cols,items:s.items.filter(function(i){return i.impres===true;})};});
  if (currentFilters.hazloc) sections = sections.map(function(s){return {name:s.name,cols:s.cols,items:s.items.filter(function(i){return i.hazloc&&i.hazloc!=='';})};});
  if (currentFilters.ip)     sections = sections.map(function(s){return {name:s.name,cols:s.cols,items:s.items.filter(function(i){return i.ip&&i.ip!=='';})};});
  sections = sections.filter(function(s){return s.items.length>0;});
  if (!sections.length) { area.innerHTML = '<div class="no-items">No accessories match the current filters.</div>'; return; }
  area.innerHTML = buildSectionsHTML(sections);
}

function renderGlobalSearch(search, area) {
  var allRadios = PORTABLE_RADIOS.concat(MOBILE_RADIOS);
  var totalItems = 0;
  var matchedRadios = 0;
  var html = '';
  allRadios.forEach(function(r) {
    var rd = RADIOS_DATA[r.key.toLowerCase()];
    if (!rd || !rd.length) return;
    var radioHtml = '';
    var radioItems = 0;
    rd.forEach(function(s) {
      var sname = s.name||s.label||'';
      var cols = (s.cols||s.columns||COLS_BY_SECTION[sname]||[]).map(function(c){return typeof c==='string'?{key:LABEL_TO_KEY[c]||c.toLowerCase().replace(/ /g,'_'),label:c}:c;});
      var items = (s.items||[]).filter(function(i){return (i.pn||i.part||'').toLowerCase().includes(search)||(i.desc||'').toLowerCase().includes(search);});
      if (currentFilters.impres) items = items.filter(function(i){return i.impres===true;});
      if (currentFilters.hazloc) items = items.filter(function(i){return i.hazloc&&i.hazloc!=='';});
      if (currentFilters.ip)     items = items.filter(function(i){return i.ip&&i.ip!=='';});
      if (!items.length) return;
      radioItems += items.length;
      radioHtml += buildSectionsHTML([{name:sname, items:items, cols:cols}]);
    });
    if (!radioItems) return;
    totalItems += radioItems;
    matchedRadios++;
    html += '<div class="sec-head" style="background:#f0f4fa;padding:8px 10px;border-radius:4px;margin-top:16px;color:#0C2D5A;font-size:12px;font-weight:600;text-transform:none;letter-spacing:0">';
    html += r.label + ' <span class="sec-count">— ' + radioItems + ' item' + (radioItems!==1?'s':'') + '</span></div>';
    html += radioHtml;
  });
  var bc = document.getElementById('breadcrumb');
  if (totalItems === 0) {
    bc.innerHTML = 'Search: <b>"' + search + '"</b> › No results';
    area.innerHTML = '<div class="no-items">No accessories found matching "' + search + '".</div>';
  } else {
    bc.innerHTML = 'Search: <b>"' + search + '"</b> › ' + totalItems + ' result' + (totalItems!==1?'s':'') + ' across ' + matchedRadios + ' radio' + (matchedRadios!==1?'s':'');
    area.innerHTML = html;
  }
}

function buildSectionsHTML(sections) {
  var html = '';
  sections.forEach(function(sec) {
    var specKeys = (sec.cols||[]).filter(function(c){return !['desc','pn','part','description'].includes((c.key||c).toLowerCase());});
    html += '<div class="sec-head">' + sec.name + ' <span class="sec-count">— ' + sec.items.length + ' item' + (sec.items.length!==1?'s':'') + '</span></div>';
    var noSpec = specKeys.length === 0;
    html += '<table class="acc-table">' + (noSpec ? '<colgroup><col style="width:42px"><col style="width:55%"><col style="width:180px"><col style="width:36px"></colgroup>' : '') + '<thead><tr>';
    html += '<th style="width:42px"></th>';
    html += '<th>Description</th>';
    html += '<th>Part #</th>';
    specKeys.forEach(function(c){html += '<th style="text-align:center">' + (c.label||c) + '</th>';});
    html += '<th style="width:36px;text-align:center;color:#888\">My List</th>';
    html += '</tr></thead><tbody>';
    var lastGroup = null;
    sec.items.forEach(function(item) {
      if (item.group && item.group !== lastGroup) {
        lastGroup = item.group;
        html += '<tr class="antenna-group-row"><td colspan="100" class="acc-subsection-title" style="padding:8px 10px 4px 10px;background:var(--surface);border-bottom:1px solid var(--border)">' + item.group + '</td></tr>';
      }
      var pn   = item.pn||item.part||'';
      var desc = item.desc||item.description||'';
      var inList = myList.includes(pn);
      var thumbUrl = PART_IMAGES[pn];
      if (!thumbUrl) {
        var _base = pn.replace(/[A-D]$/, '').replace(/0[1-4]$/, '');
        if (_base !== pn) thumbUrl = PART_IMAGES[_base];
      }
      if (!thumbUrl) { var _sfx = ['A','B','C','D','01','02','03','04']; for (var _i=0;_i<_sfx.length;_i++) { if (PART_IMAGES[pn+_sfx[_i]]) { thumbUrl = PART_IMAGES[pn+_sfx[_i]]; break; } } }
      html += '<tr style="cursor:pointer" onclick="showAccSidebar(\'' + pn + '\',\'' + desc.replace(/'/g,' ') + '\')">';
html += '<td>' + (thumbUrl ? '<img src="' + thumbUrl + '" style="width:34px;height:34px;object-fit:contain;border-radius:4px;border:0.5px solid #e0e0e0;cursor:pointer">' : '<div class="img-box"></div>') + '</td>';
      html += '<td>' + desc + '</td>';
      html += '<td class="pn" title="Click to copy" style="cursor:pointer" onclick="copyPN(this,\'' + pn + '\')">' + pn + '</td>';
      specKeys.forEach(function(c) {
        var k = c.key||c;
        var dataKey = LABEL_TO_KEY[k]||k;
        var v = item[dataKey];
        if (v===true) html += '<td class="chk-yes" style="text-align:center">&#10003;</td>';
        else if (v===false||v===null||v===undefined||v==='') html += '<td class="chk-no" style="text-align:center">—</td>';
        else if (dataKey==='ip') html += '<td style="text-align:center"><span class="spec-tag tag-ip">' + v + '</span></td>';
        else if (k==='hazloc') html += '<td style="text-align:center">' + (v==='UL'?'<span class="spec-tag tag-ul">UL</span>':v==='ATEX'?'<span class="spec-tag tag-atex">ATEX</span>':v==='CSA'?'<span class="spec-tag tag-csa">CSA</span>':v?'<span class="spec-tag tag-hz">'+v+'</span>':'<span class="chk-no">—</span>') + '</td>';
        else html += '<td style="text-align:center">' + v + '</td>';
      });
      html += '<td><input type="checkbox" class="row-cb"' + (inList?' checked':'') + ' onchange="toggleItem(\'' + pn + '\',this.checked)"></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  });
  return html;
}

function onSearchInput() {var q = document.getElementById("search-input").value;document.getElementById("search-clear").style.display = q ? "inline" : "none";render();}function clearSearch() {document.getElementById("search-input").value = "";document.getElementById("search-clear").style.display = "none";render();}function toggleItem(pn, checked) {
  if (checked && !myList.includes(pn)) myList.push(pn);
  else if (!checked) myList = myList.filter(p => p !== pn);
  document.getElementById('mylist-count').textContent = myList.length;
}

function copyPN(el, pn) {
  navigator.clipboard.writeText(pn);
  var orig = el.textContent;
  el.textContent = 'Copied!';
  el.style.color = '#1D9E75';
  setTimeout(function() { el.textContent = orig; el.style.color = ''; }, 1200);
}

function toggleMyListPanel() {
  var panel = document.getElementById('mylist-panel');
  var overlay = document.getElementById('mylist-overlay');
  if (panel.style.display === 'flex') { closeMyListPanel(); return; }
  renderMyListPanel();
  panel.style.display = 'flex';
  overlay.style.display = 'block';
}

function closeMyListPanel() {
  document.getElementById('mylist-panel').style.display = 'none';
  document.getElementById('mylist-overlay').style.display = 'none';
}

function renderMyListPanel() {
  var container = document.getElementById('mylist-items');
  if (!myList.length) {
    container.innerHTML = '<div style="color:#aaa;font-size:13px;text-align:center;padding:40px 0">No items selected</div>';
    return;
  }
  var html = '';
  myList.forEach(function(pn) {
    var item = findItemByPN(pn);
    var desc = item ? (item.desc || item.description || '') : '';
    var thumb = PART_IMAGES[pn] || '';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #f0f0f0">';
    if (thumb) html += '<img src="' + thumb + '" style="width:40px;height:40px;object-fit:contain;border-radius:4px;border:0.5px solid #e0e0e0;flex-shrink:0">';
    else html += '<div style="width:40px;height:40px;background:#f5f5f5;border-radius:4px;flex-shrink:0"></div>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-family:monospace;font-size:11px;color:#888">' + pn + '</div>';
    html += '<div style="font-size:12px;color:#222;margin-top:2px;line-height:1.3">' + desc + '</div>';
    html += '</div>';
    html += '<span onclick="removeFromList(\'' + pn + '\')" style="color:#ccc;cursor:pointer;font-size:18px;flex-shrink:0">&times;</span>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function findItemByPN(pn) {
  var radios = Object.values(RADIOS_DATA);
  for (var i=0;i<radios.length;i++) {
    var cats = radios[i];
    for (var j=0;j<cats.length;j++) {
      var items = cats[j].items || [];
      for (var k=0;k<items.length;k++) {
        if ((items[k].part||items[k].pn) === pn) return items[k];
      }
    }
  }
  return null;
}

function removeFromList(pn) {
  myList = myList.filter(function(p) { return p !== pn; });
  document.getElementById('mylist-count').textContent = myList.length;
  renderMyListPanel();
  render();
}

function clearMyList() {
  myList = [];
  document.getElementById('mylist-count').textContent = 0;
  renderMyListPanel();
  render();
}

function generateReport() {
  if (!myList.length) return;
  var rows = myList.map(function(pn) {
    var item = findItemByPN(pn) || {};
    return { pn: pn, desc: item.desc || item.description || '', item: item };
  });
  var win = window.open('', '_blank');
  win.document.write(buildReportHTML(rows));
  win.document.close();
}

function buildReportHTML(rows) {
  var date = new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
  var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Accessory Report</title>';
  h += '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;color:#222;padding:24px}h1{font-size:18px;color:#0C2D5A}table{width:100%;border-collapse:collapse;margin-top:16px}th{background:#0C2D5A;color:#fff;padding:8px 10px;text-align:left;font-size:11px}td{padding:8px 10px;border-bottom:0.5px solid #e0e0e0;vertical-align:middle}.pn{font-family:monospace;font-size:11px;color:#555}.header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #185FA5;padding-bottom:12px;margin-bottom:20px}.meta{font-size:11px;color:#888}img.thumb{width:36px;height:36px;object-fit:contain}@media print{body{padding:12px}}</style>';
  h += '</head><body>';
  h += '<div class="header"><img src="https://dlun1971.github.io/pcr-catalog/assets/images/motorola-solutions-logo.png" style="height:36px;object-fit:contain"><h1 style="margin-left:12px">MOTOTRBO Accessory Report</h1><div class="meta">Generated: ' + date + '<br>' + rows.length + ' item' + (rows.length!==1?'s':'') + ' selected</div></div>';
  h += '<table><thead><tr><th></th><th>Part #</th><th>Description</th><th>IP</th><th>HazLoc</th><th>IMPRES</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    var thumb = PART_IMAGES[r.pn] ? '<img class=\'thumb\' src=\'' + PART_IMAGES[r.pn] + '\'>' : '';
    h += '<tr>';
    h += '<td>' + thumb + '</td>';
    h += '<td class=\'pn\'>' + r.pn + '</td>';
    h += '<td>' + r.desc + '</td>';
    h += '<td>' + (r.item.ip||'') + '</td>';
    h += '<td>' + (r.item.hazloc||'') + '</td>';
    h += '<td>' + (r.item.impres?'Yes':'') + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></body></html>';
  return h;
}

ze:10px;background:#e8f0fb;color:#0C2D5A;border-radius:4px;padding:1px 6px">' + item.radio + '</span>';    if (item.added) html += '<span style="font-size:10px;color:#bbb;margin-left:auto">' + item.added + '</span>';    html += '</div>';    html += '<div style="font-size:12px;color:#222;line-height:1.3">' + (item.desc||'') + '</div>';    html += '</div></div>';  });  container.innerHTML = html;}function init() {

  buildPortablePills();

}
