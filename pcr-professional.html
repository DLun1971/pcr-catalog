<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCR Professional Tier Accessory Catalog</title>
<link rel="stylesheet" href="https://dlun1971.github.io/pcr-catalog/styles.css">
<script src="https://dlun1971.github.io/pcr-catalog/data/r7-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/ion-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/r5-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/r7ex-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/xpr7000-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/dp-atex-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/dp3000-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/xpr6000-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/xpr3000-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/sl-data.js"></script>
<script src="https://dlun1971.github.io/pcr-catalog/data/xpr-mobile-data.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;min-height:100vh;overflow-y:auto}

/* TOPBAR */
#topbar{background:#0C2D5A;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
#topbar-left{display:flex;align-items:center;gap:12px}
#moto-icon{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#brand{color:#fff;font-size:15px;font-weight:500;letter-spacing:0.01em}
#mylist-pill{display:flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,0.35);border-radius:20px;padding:5px 16px;cursor:pointer;color:#fff;font-size:12px;user-select:none}
#mylist-pill:hover{background:rgba(255,255,255,0.1)}
#mylist-count{background:rgba(255,255,255,0.2);border-radius:10px;padding:1px 7px;font-size:11px;color:#fff}

/* RADIO PANEL */
#radio-panel{background:#112240;padding:14px 20px 14px}
.panel-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.rpill{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,0.3);background:transparent;color:#fff;user-select:none;transition:background 0.15s,border-color 0.15s}
.rpill:hover{background:rgba(255,255,255,0.1)}
.rpill.active{background:#185FA5;border-color:#185FA5;font-weight:500}
.rpill.mobile{border-color:rgba(93,202,165,0.5)}
.rpill.mobile:hover{background:rgba(29,158,117,0.2)}
.rpill.mobile.active{background:#0F6E56;border-color:#0F6E56}

/* variant pills removed */

/* FILTER STRIP */
#filter-strip{display:flex;align-items:center;gap:8px;padding:10px 0 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:10px}
#filter-label{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
.ftoggle{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;font-size:11px;cursor:pointer;user-select:none;transition:all 0.15s}
.ftoggle:hover{border-color:rgba(255,255,255,0.45)}
.ftoggle.active.f-blue{background:rgba(56,138,221,0.25);border-color:#378ADD}
.ftoggle.active.f-green{background:rgba(29,158,117,0.25);border-color:#1D9E75}
.ftoggle.active.f-amber{background:rgba(186,117,23,0.25);border-color:#BA7517}
.fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.3)}
.ftoggle.active.f-blue .fdot{background:#378ADD}
.ftoggle.active.f-green .fdot{background:#1D9E75}
.ftoggle.active.f-amber .fdot{background:#EF9F27}

/* CONTENT AREA */
#content-area{background:#fff;border-top:3px solid #185FA5}
#cat-bar{padding:10px 20px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:0.5px solid #e0e0e0}
.cpill{padding:4px 13px;border-radius:14px;font-size:12px;cursor:pointer;border:0.5px solid #ccc;color:#555;background:transparent;user-select:none;transition:all 0.15s}
.cpill:hover{background:#f0f0f0}
.cpill.active{background:#0C2D5A;border-color:#0C2D5A;color:#fff}

#toolbar{padding:8px 20px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid #e0e0e0}
#breadcrumb{font-size:12px;color:#777}
#breadcrumb b{color:#222;font-weight:500}
#search-input{border:0.5px solid rgba(255,255,255,0.3);border-radius:6px;padding:5px 12px;font-size:12px;width:260px;color:#fff;background:rgba(255,255,255,0.1)}
#search-input::placeholder{color:rgba(255,255,255,0.5)}
#search-input:focus{outline:none;border-color:rgba(255,255,255,0.7)}

#table-area{padding:0 20px 40px}
.sec-head{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;padding:16px 0 6px;display:flex;align-items:center;gap:8px}
.sec-count{font-weight:400;color:#bbb;text-transform:none;letter-spacing:0;font-size:11px}
.no-items{font-size:13px;color:#aaa;padding:12px 0}

table.acc-table{width:100%;border-collapse:collapse;font-size:12px}
table.acc-table th{text-align:left;padding:7px 10px;border-bottom:1px solid #ddd;font-size:11px;font-weight:500;color:#888;white-space:nowrap;background:#fafafa}
table.acc-table td{padding:8px 10px;border-bottom:0.5px solid #f0f0f0;color:#222;vertical-align:middle}
table.acc-table tr:last-child td{border-bottom:none}
table.acc-table tr:hover td{background:#f9f9f9}
.img-box{width:34px;height:34px;background:#f0f0f0;border-radius:4px;border:0.5px solid #e0e0e0;flex-shrink:0}
.pn{font-family:monospace;font-size:11px;color:#888}
.chk-yes{color:#1D9E75;text-align:center;font-size:13px}
.chk-no{color:#ccc;text-align:center;font-size:13px}
.row-cb{cursor:pointer;width:14px;height:14px}
.spec-tag{display:inline-block;font-size:10px;padding:2px 5px;border-radius:6px;margin-left:3px;vertical-align:middle}
.tag-ip{background:#E6F1FB;color:#0C447C}
.tag-hz{background:#EAF3DE;color:#3B6D11}
#page-wrap{display:flex;align-items:stretch}
#main-col{flex:1;min-width:0}
#radio-sidebar{width:220px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;align-items:center;padding:24px 16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow:hidden}
#sidebar-img{width:180px;height:180px;object-fit:contain;display:block}
#sidebar-img.hidden{display:none}
#sidebar-placeholder{width:180px;height:180px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px}
#sidebar-name{margin-top:16px;font-size:14px;font-weight:600;color:#0C2D5A;text-align:center}
#sidebar-type{font-size:11px;color:#888;margin-top:4px;text-align:center}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="topbar-left">
    <div id="moto-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="white" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="3" fill="white"/>
      </svg>
    </div>
    <span id="brand">MOTOTRBO Professional Catalog</span>
  </div>
  <input id="search-input" placeholder="Search part # or description…" oninput="render()" style="border:0.5px solid rgba(255,255,255,0.3);border-radius:6px;padding:5px 12px;font-size:12px;width:260px;color:#fff;background:rgba(255,255,255,0.1);outline:none">
  <div id="mylist-pill" onclick="toggleMyListPanel()">
    My List <span id="mylist-count">0</span>
  </div>
</div>

<!-- RADIO PANEL -->
<div id="radio-panel">
  <div class="panel-label">Portable</div>
  <div class="pill-row" id="portable-pills"></div>

  <div id="variant-info" style="display:none;padding:8px 0 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:6px;font-size:11px;color:rgba(255,255,255,0.65);line-height:1.5"></div>

  <div style="margin-top:12px">
    <div class="panel-label">Mobile</div>
    <div class="pill-row" id="mobile-pills"></div>
  </div>


  </div>
</div>

<!-- CONTENT AREA -->
<div id="page-wrap">
<div id="radio-sidebar">
  <img id="sidebar-img" class="hidden" src="" alt="">
  <div id="sidebar-placeholder">No image</div>
  <div id="sidebar-name"></div>
  <div id="sidebar-type"></div>
</div>
<div id="main-col">
<div id="content-area">
  <div id="cat-bar"></div>
  <div id="toolbar">
    <span id="breadcrumb"><b>Select a radio</b></span>
  </div>
  <div id="table-area"></div>
</div>
</div>
</div>

<script>
// ---- DATA MAP ----

const PORTABLE_RADIOS = [
  {label:'R7',       key:'r7'},
  {label:'Ion',      key:'ion'},
  {label:'R5',       key:'r5'},
  {label:'R7Ex',     key:'r7ex'},
  {label:'XPR 7000', key:'xpr7000'},
  {label:'DP ATEX',  key:'dpatex'},
  {label:'XPR 6000', key:'xpr6000'},
  {label:'XPR 3000', key:'xpr3000'},
  {label:'SL Series',key:'sl'},
];

const MOBILE_RADIOS = [
  {label:'XPR 5000', key:'xpr5000'},
  {label:'XPR 4000', key:'xpr4000'},
  {label:'XPR 2500', key:'xpr2500'},
];

const VARIANT_MAP = {
  xpr7000: [{label:'7350',key:'xpr7350'},{label:'7550',key:'xpr7550'},{label:'7580',key:'xpr7580'},{label:'7580e',key:'xpr7580e'}],
  xpr6000: [{label:'6350',key:'xpr6350'},{label:'6550',key:'xpr6550'},{label:'6580',key:'xpr6580'}],
  sl:      [{label:'7000',key:'sl7000'},{label:'7000e',key:'sl7000e'},{label:'3500e',key:'sl3500e'},{label:'3500 Max',key:'sl3500max'}],
  xpr3000: [{label:'3000',key:'xpr3000'},{label:'3000e',key:'xpr3000e'}],
  dpatex:  [{label:'4400e',key:'dp4400e'},{label:'4600e',key:'dp4600e'},{label:'4800e',key:'dp4800e'},{label:'3000e',key:'dp3000e'}],
};

const VARIANT_INFO = {
  xpr7000: 'XPR 7000 Series: Covers XPR 7350 · 7550 · 7580 · 7580e — accessory compatibility is consistent across all variants unless noted.',
  xpr6000: 'XPR 6000 Series: Covers XPR 6350 · 6550 · 6580 — accessory compatibility is consistent across all variants unless noted.',
  xpr3000: 'XPR 3000 Series: Covers XPR 3000 · 3000e — accessory compatibility is consistent across all variants unless noted.',
};
const PORTABLE_CATS = ['All','Batteries','Chargers','RSM/Audio','Surveillance/Earpieces','Headsets','Carry','Antennas','Cables','Screen Protectors','IMPRES Tools','Bluetooth'];
const LABEL_TO_KEY = {
  'Description':'desc','Part Number':'part','Part #':'part','IMPRES':'impres',
  'Chemistry':'chem','Typical Capacity (mAh)':'capacity_mah','Capacity (mAh)':'capacity_mah',
  'Dimensions (mm)':'dims_mm','Weight':'weight_g','Weight (g)':'weight_g',
  'HazLoc':'hazloc','IP':'ip','Op Temp':'op_temp','Pockets':'pockets',
  'Power':'pwr_src','Intel Audio':'intel_audio','Noise Cancel':'noise_cancel',
  'Ear Type':'ear_type','Mic Type':'mic_type','Full Duplex':'full_duplex',
  'Type':'headset_type','Ear Style':'ear_style','NRR (dB)':'nrr_db',
  'Material':'material','Belt Size':'belt_sz','Swivel':'swivel','Display':'display','D-Rings':'d_rings',
  'Band':'band','Freq (MHz)':'freq_mhz','Length (cm)':'len_cm',
  'PTT':'ptt','Talk Time (hr)':'talk_time_hr','Charge Time (hr)':'charge_time_hr',
};
const COLS_BY_SECTION = {
  'Batteries':       [{key:'impres',label:'IMPRES'},{key:'chem',label:'Chemistry'},{key:'capacity_mah',label:'Capacity (mAh)'},{key:'weight_g',label:'Weight (g)'},{key:'ip',label:'IP'},{key:'hazloc',label:'HazLoc'},{key:'op_temp',label:'Op Temp'}],
  'Chargers':        [{key:'impres',label:'IMPRES'},{key:'chem',label:'Chemistry'},{key:'pwr_src',label:'Power'},{key:'pockets',label:'Pockets'}],
  'RSM/Audio':       [{key:'impres',label:'IMPRES'},{key:'intel_audio',label:'Intel Audio'},{key:'ai_noise',label:'AI Noise'},{key:'windporting',label:'Windporting'},{key:'noise_cancel',label:'Noise Cancel'},{key:'full_duplex',label:'Full Duplex'},{key:'vol_ctrl',label:'Vol Ctrl'},{key:'prog_btn',label:'Prog Btn'},{key:'audio_jack',label:'Audio Jack'},{key:'ip',label:'IP'},{key:'hazloc',label:'HazLoc'},{key:'dims_mm',label:'Dims (mm)'}],
  'Surveillance/Earpieces':[{key:'impres',label:'IMPRES'},{key:'intel_audio',label:'Intel Audio'},{key:'ear_type',label:'Ear Type'},{key:'mic_type',label:'Mic Type'},{key:'hazloc',label:'HazLoc'}],
  'Headsets':        [{key:'impres',label:'IMPRES'},{key:'headset_type',label:'Type'},{key:'ear_style',label:'Ear Style'},{key:'nrr_db',label:'NRR (dB)'},{key:'hazloc',label:'HazLoc'}],
  'Carry':           [{key:'material',label:'Material'},{key:'belt_sz',label:'Belt Size'},{key:'swivel',label:'Swivel'},{key:'display',label:'Display'},{key:'d_rings',label:'D-Rings'}],
  'Antennas':        [{key:'band',label:'Band'},{key:'freq_mhz',label:'Freq (MHz)'},{key:'len_cm',label:'Length (cm)'},{key:'ant_type',label:'Type'}],
  'Cables':          [],
  'Screen Protectors':[],
  'IMPRES Tools':    [],
  'Bluetooth':       [{key:'ear_type',label:'Ear Type'},{key:'mic_type',label:'Mic'},{key:'ptt',label:'PTT'},{key:'talk_time_hr',label:'Talk Time (hr)'},{key:'weight_g',label:'Weight (g)'}],
  'Microphones':     [{key:'impres',label:'IMPRES'},{key:'ip',label:'IP'},{key:'hazloc',label:'HazLoc'}],
  'Mic Accessories': [],
  'External PTT':    [],
  'Wireless Kits':   [{key:'ear_type',label:'Ear Type'},{key:'ptt',label:'PTT'},{key:'talk_time_hr',label:'Talk Time (hr)'}],
  'Control Station': [],
  'Installation':    [],
  'Speakers':        [{key:'ip',label:'IP'},{key:'hazloc',label:'HazLoc'}],
};
const MOBILE_CATS   = ['All','Microphones','Mic Accessories','External PTT','Wireless Kits','Control Station','Installation','Speakers','Cables','Antennas'];

const RADIO_IMAGES = {
  r7:    'https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/mototrbo/portable-radios/r7-series/mototrbo_r7_fkp_redner_front.png',
  r5:    'https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/mototrbo/portable-radios/r5/R5_lkp_front_1290x1290.webp',
  ion:   null,
  r7ex:  null,
  xpr7000: null,
  dpatex: null,
  xpr6000: null,
  xpr3000: null,
  sl:    null,
  xpr5000: null,
  xpr4000: null,
  xpr2500: null,
};

function updateSidebar() {
  var img = document.getElementById('sidebar-img');
  var placeholder = document.getElementById('sidebar-placeholder');
  var name = document.getElementById('sidebar-name');
  var type = document.getElementById('sidebar-type');
  var url = RADIO_IMAGES[currentRadioKey];
  name.textContent = currentRadio || '';
  type.textContent = isMobile ? 'Mobile Radio' : 'Portable Radio';
  if (url) {
    img.src = url;
    img.classList.remove('hidden');
    placeholder.style.display = 'none';
  } else {
    img.classList.add('hidden');
    placeholder.style.display = 'flex';
  }
}

// ---- STATE ----
let currentRadio   = null;
let currentRadioKey = null;
let currentVariant = null;
let currentCat     = 'All';
let currentFilters = {impres:false, hazloc:false, ip:false};
let myList         = [];
let isMobile       = false;

// ---- INIT ----
function init() {
  buildPortablePills();
  buildMobilePills();
  selectRadio('R7', 'r7', false);
}

function buildPortablePills() {
  const row = document.getElementById('portable-pills');
  row.innerHTML = '';
  PORTABLE_RADIOS.forEach(r => {
    const d = document.createElement('div');
    d.className = 'rpill' + (r.label === currentRadio ? ' active' : '');
    d.textContent = r.label;
    d.onclick = () => selectRadio(r.label, r.key, false);
    row.appendChild(d);
  });
}

function buildMobilePills() {
  const row = document.getElementById('mobile-pills');
  row.innerHTML = '';
  MOBILE_RADIOS.forEach(r => {
    const d = document.createElement('div');
    d.className = 'rpill mobile' + (r.label === currentRadio ? ' active' : '');
    d.textContent = r.label;
    d.onclick = () => selectRadio(r.label, r.key, true);
    row.appendChild(d);
  });
}

function selectRadio(label, key, mobile) {
  currentRadio    = label;
  currentRadioKey = key;
  isMobile        = mobile;
  currentCat      = 'All';
  currentVariant  = null;
  buildPortablePills();
  buildMobilePills();
  buildVariantStrip(key);
  buildCatBar();
  render();
  updateSidebar();
}

function buildVariantStrip(key) {
  var info = document.getElementById('variant-info');
  var text = VARIANT_INFO[key];
  if (text) {
    info.textContent = text;
    info.style.display = 'block';
  } else {
    info.textContent = '';
    info.style.display = 'none';
  }
}

function buildCatBar() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = '';
  const cats = isMobile ? MOBILE_CATS : PORTABLE_CATS;
  cats.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cpill' + (c === currentCat ? ' active' : '');
    d.textContent = c;
    d.onclick = () => {
      currentCat = c;
      buildCatBar();
      render();
    };
    bar.appendChild(d);
  });
}



function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = (currentRadio || '') + ' &rsaquo; <b>' + currentCat + '</b>';
}

// ---- RENDER ----
function render() {
  var area   = document.getElementById('table-area');
  var search = document.getElementById('search-input').value.toLowerCase().trim();
  if (search.length > 0) { renderGlobalSearch(search, area); return; }
  updateBreadcrumb();
  var rd = RADIOS_DATA[currentRadioKey.toLowerCase()];
  if (!rd || !rd.length) { area.innerHTML = '<div class="no-items">No data available for this radio.</div>'; return; }
  var sections = [];
  if (currentCat === 'All') {
    sections = rd.map(function(s) { return {name: s.name||s.label, items: s.items||[], cols: (s.cols||s.columns||COLS_BY_SECTION[s.name||s.label]||[]).map(function(c){return typeof c==='string'?{key:LABEL_TO_KEY[c]||c.toLowerCase().replace(/ /g,'_'),label:c}:c;})}; });
  } else {
    var found = rd.find(function(s){return (s.name||s.label||'').toLowerCase()===currentCat.toLowerCase();});
    if (found) sections = [{name:found.name||found.label, items:found.items||[], cols:(found.cols||found.columns||COLS_BY_SECTION[found.name||found.label]||[]).map(function(c){return typeof c==='string'?{key:LABEL_TO_KEY[c]||c.toLowerCase().replace(/ /g,'_'),label:c}:c;})}];
  }
  if (currentFilters.impres) sections = sections.map(function(s){return {name:s.name,cols:s.cols,items:s.items.filter(function(i){return i.impres===true;})};});
  if (currentFilters.hazloc) sections = sections.map(function(s){return {name:s.name,cols:s.cols,items:s.items.filter(function(i){return i.hazloc&&i.hazloc!=='';})};});
  if (currentFilters.ip)     sections = sections.map(function(s){return {name:s.name,cols:s.cols,items:s.items.filter(function(i){return i.ip&&i.ip!=='';})};});
  sections = sections.filter(function(s){return s.items.length>0;});
  if (!sections.length) { area.innerHTML = '<div class="no-items">No accessories match the current filters.</div>'; return; }
  area.innerHTML = buildSectionsHTML(sections);
}

function renderGlobalSearch(search, area) {
  var allRadios = PORTABLE_RADIOS.concat(MOBILE_RADIOS);
  var totalItems = 0;
  var matchedRadios = 0;
  var html = '';
  allRadios.forEach(function(r) {
    var rd = RADIOS_DATA[r.key.toLowerCase()];
    if (!rd || !rd.length) return;
    var radioHtml = '';
    var radioItems = 0;
    rd.forEach(function(s) {
      var sname = s.name||s.label||'';
      var cols = (s.cols||s.columns||COLS_BY_SECTION[sname]||[]).map(function(c){return typeof c==='string'?{key:LABEL_TO_KEY[c]||c.toLowerCase().replace(/ /g,'_'),label:c}:c;});
      var items = (s.items||[]).filter(function(i){return (i.pn||i.part||'').toLowerCase().includes(search)||(i.desc||'').toLowerCase().includes(search);});
      if (currentFilters.impres) items = items.filter(function(i){return i.impres===true;});
      if (currentFilters.hazloc) items = items.filter(function(i){return i.hazloc&&i.hazloc!=='';});
      if (currentFilters.ip)     items = items.filter(function(i){return i.ip&&i.ip!=='';});
      if (!items.length) return;
      radioItems += items.length;
      radioHtml += buildSectionsHTML([{name:sname, items:items, cols:cols}]);
    });
    if (!radioItems) return;
    totalItems += radioItems;
    matchedRadios++;
    html += '<div class="sec-head" style="background:#f0f4fa;padding:8px 10px;border-radius:4px;margin-top:16px;color:#0C2D5A;font-size:12px;font-weight:600;text-transform:none;letter-spacing:0">';
    html += r.label + ' <span class="sec-count">— ' + radioItems + ' item' + (radioItems!==1?'s':'') + '</span></div>';
    html += radioHtml;
  });
  var bc = document.getElementById('breadcrumb');
  if (totalItems === 0) {
    bc.innerHTML = 'Search: <b>"' + search + '"</b> › No results';
    area.innerHTML = '<div class="no-items">No accessories found matching "' + search + '".</div>';
  } else {
    bc.innerHTML = 'Search: <b>"' + search + '"</b> › ' + totalItems + ' result' + (totalItems!==1?'s':'') + ' across ' + matchedRadios + ' radio' + (matchedRadios!==1?'s':'');
    area.innerHTML = html;
  }
}

function buildSectionsHTML(sections) {
  var html = '';
  sections.forEach(function(sec) {
    var specKeys = (sec.cols||[]).filter(function(c){return !['desc','pn','part','description'].includes((c.key||c).toLowerCase());});
    html += '<div class="sec-head">' + sec.name + ' <span class="sec-count">— ' + sec.items.length + ' item' + (sec.items.length!==1?'s':'') + '</span></div>';
    html += '<table class="acc-table"><thead><tr>';
    html += '<th style="width:42px"></th>';
    html += '<th>Description</th>';
    html += '<th>Part #</th>';
    specKeys.forEach(function(c){html += '<th>' + (c.label||c) + '</th>';});
    html += '<th style="width:36px"></th>';
    html += '</tr></thead><tbody>';
    sec.items.forEach(function(item) {
      var pn   = item.pn||item.part||'';
      var desc = item.desc||item.description||'';
      var inList = myList.includes(pn);
      html += '<tr>';
      html += '<td><div class="img-box"></div></td>';
      html += '<td>' + desc + '</td>';
      html += '<td class="pn">' + pn + '</td>';
      specKeys.forEach(function(c) {
        var k = c.key||c;
        var v = item[k];
        if (v===true) html += '<td class="chk-yes" style="text-align:center">✓</td>';
        else if (v===false||v===null||v===undefined||v==='') html += '<td class="chk-no" style="text-align:center">—</td>';
        else if (k==='ip') html += '<td style="text-align:center"><span class="spec-tag tag-ip">' + v + '</span></td>';
        else if (k==='hazloc') html += '<td style="text-align:center"><span class="spec-tag tag-hz">' + v + '</span></td>';
        else html += '<td style="text-align:center">' + v + '</td>';
      });
      html += '<td><input type="checkbox" class="row-cb"' + (inList?' checked':'') + ' onchange="toggleItem(\'' + pn + '\',this.checked)"></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  });
  return html;
}

// ---- MY LIST ----
function toggleItem(pn, checked) {
  if (checked && !myList.includes(pn)) myList.push(pn);
  else if (!checked) myList = myList.filter(p => p !== pn);
  document.getElementById('mylist-count').textContent = myList.length;
}

function toggleMyListPanel() {
  // placeholder for future panel
  alert('My List: ' + (myList.length ? myList.join(', ') : 'empty'));
}

window.addEventListener('DOMContentLoaded', init);
</script>
